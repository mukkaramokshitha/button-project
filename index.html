<STYLE>
.SUBSCRIBE-button {
    background-color: rgb(194, 14, 14);
    color: white;
    border: none;
    width: 105px;
    height: 36px;
    border-radius: 3px;
    cursor: pointer;
    margin-right: 6px;
    
}
.join-button{
    background-color: white;
    color: rgb(53, 132, 222);
    border-color: rgb(53, 132, 222);
    border-style: solid;
    height: 36px;
    width: 70px;
    border-radius:3px;
    margin-right: 5px;
    cursor: pointer;
}
.twitter-button{
    background-color: rgb(46, 143, 234);
    color: rgb(255, 255,255);
    height: 36px;
    width: 105px;
    border-radius: 25px;
    border: none;
    cursor: progress;
    font-size: 15px;
    font-weight: bold;
    margin-right: 6px;
}
.requestnow-button{
    background-color: black;
    color: white;
    height: 36px;
    width: 105px;
    margin-right: 6px;
}
.addtocart-button{
    background-color: rgb(253, 216, 8);
    height: 33px;
    width: 162px;
    border-radius: 22px;
    border: none;
}
</STYLE>
<button class="subscribe-button">
    SUBSCRIBE
</button>
<button class="join-button">
    JOIN
</button>
<button
    class="twitter-button">
    TWITTER
</button>
<button class="requestnow-button">
    Request now
</button>
<button class="addtocart-button">
    Add to cart
</button>
